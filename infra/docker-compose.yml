services:
  postgres:
    image: postgres:16-alpine
    container_name: research-copilot-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-research_copilot}
      POSTGRES_USER: ${POSTGRES_USER:-research_copilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-research_copilot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
